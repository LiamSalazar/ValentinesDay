<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>LoveU</title>
  <link rel="stylesheet" href="HomeStyle.css" />
</head>
<body>
  <main class="parallax">
    <section class="parallax__header">
      <div class="parallax__visuals">
        <div class="parallax__black-line-overflow"></div>

        <div data-parallax-layers class="parallax__layers">
          <img
            src="https://wallpapercat.com/w/full/9/5/1/117606-3840x2160-desktop-4k-your-name-background.jpg"
            loading="eager"
            width="800"
            data-parallax-layer="1"
            alt="Cielo estrellado"
            class="parallax__layer-img parallax__sky"
          />

          <img
            src="Kilimanjaro.png"
            loading="eager"
            width="800"
            data-parallax-layer="2"
            alt="Montaña"
            class="parallax__layer-img parallax__mountain"
          />

          <div data-parallax-layer="3" class="parallax__layer-title">
            <h2 class="parallax__title"></h2>
          </div>

          <img
            src="FloorWithPeople.png"
            loading="eager"
            width="800"
            data-parallax-layer="4"
            alt="Pareja abrazándose"
            class="parallax__layer-img parallax__foreground"
          />
        </div>

        <div class="parallax__radial-gradient"></div>
        <div class="parallax__fade"></div>
      </div>
    </section>

    <section class="parallax__content">
      <div class="container">
        <a href="carta.html" class="button-link">
          <button type="button">Ábreme</button>
        </a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="HomeScript.js"></script>
</body>
</html>
